<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocuMind — AI Document Processing Pipeline</title>
<style>
/* ═══════════════════════════════════════════════
   ROOT TOKENS
   ═══════════════════════════════════════════════ */
:root {
  --bg: #0a0a0b;
  --bg-surface: #121214;
  --bg-card: #18181b;
  --bg-card-hover: #1f1f23;
  --bg-elevated: #222226;
  --border: #27272a;
  --border-accent: #3f3f46;
  --text-primary: #f4f4f5;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #22d379;
  --accent-dim: #16a34a;
  --accent-glow: rgba(34, 211, 121, 0.15);
  --danger: #ef4444;
  --warning: #f59e0b;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro", "Inter", "Segoe UI", Roboto, sans-serif;
  --font-mono: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", monospace;
  --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
  --bg: #fafafa;
  --bg-surface: #ffffff;
  --bg-card: #f4f4f5;
  --bg-card-hover: #e4e4e7;
  --bg-elevated: #e4e4e7;
  --border: #d4d4d8;
  --border-accent: #a1a1aa;
  --text-primary: #18181b;
  --text-secondary: #52525b;
  --text-muted: #a1a1aa;
  --accent: #16a34a;
  --accent-glow: rgba(22, 163, 74, 0.1);
}

/* ═══════════════════════════════════════════════
   BASE
   ═══════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════
   SCROLLBAR
   ═══════════════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ═══════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════ */
header {
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg-surface);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: #000;
  flex-shrink: 0;
}

.header-title h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.header-title p {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 1px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.header-stat {
  text-align: right;
}

.header-stat .number {
  font-size: 20px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
}

.header-stat .label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.theme-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  width: 36px;
  height: 36px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.theme-toggle:hover {
  border-color: var(--border-accent);
  color: var(--text-primary);
}

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
.app-container {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════
   SIDEBAR TIMELINE
   ═══════════════════════════════════════════════ */
.sidebar {
  width: 360px;
  min-width: 360px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--bg-surface);
}

.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h2 {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 500ms ease;
}

.progress-text {
  font-size: 12px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

.timeline-weeks {
  padding: 12px 0;
}

/* ═══════════════════════════════════════════════
   WEEK SECTIONS IN TIMELINE
   ═══════════════════════════════════════════════ */
.week-group {}

.week-label {
  padding: 8px 20px 4px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
}

.day-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  cursor: pointer;
  transition: var(--transition);
  border-left: 2px solid transparent;
  position: relative;
}

.day-item:hover {
  background: var(--bg-card-hover);
}

.day-item.active {
  background: var(--accent-glow);
  border-left-color: var(--accent);
}

.day-indicator {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
  transition: var(--transition);
  color: var(--text-muted);
}

.day-item.completed .day-indicator {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

.day-item.in-progress .day-indicator {
  border-color: var(--accent);
  color: var(--accent);
}

.day-item.not-started .day-indicator {
  border-color: var(--border);
  color: var(--text-muted);
}

.day-meta {
  flex: 1;
  min-width: 0;
}

.day-meta .day-topic {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.day-meta .day-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}

.day-status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.day-item.completed .day-status-dot { background: var(--accent); }
.day-item.in-progress .day-status-dot { background: var(--warning); }
.day-item.not-started .day-status-dot { background: var(--text-muted); }

.day-item.locked .day-status-dot { background: transparent; border: 1.5px solid var(--border); }

/* ═══════════════════════════════════════════════
   DETAIL PANEL
   ═══════════════════════════════════════════════ */
.detail-panel {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  text-align: center;
  gap: 12px;
}

.empty-state .icon {
  font-size: 48px;
  opacity: 0.3;
}

.empty-state h3 {
  font-size: 18px;
  color: var(--text-secondary);
  font-weight: 500;
}

.empty-state p {
  font-size: 14px;
  max-width: 360px;
}

/* -- Day Detail Content -- */
.day-detail {}

.day-header {
  margin-bottom: 28px;
}

.day-breadcrumb {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.day-header h2 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 6px;
}

.day-header .focus-text {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.day-why {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  margin-bottom: 24px;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.day-why strong {
  color: var(--accent);
  font-weight: 600;
}

/* -- Section Cards -- */
.section-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: 16px;
  overflow: hidden;
}

.section-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  transition: var(--transition);
}

.section-card-header:hover {
  background: var(--bg-card-hover);
}

.section-card-header .icon {
  font-size: 16px;
  width: 24px;
  text-align: center;
  flex-shrink: 0;
}

.section-card-header h3 {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
}

.section-card-header .chevron {
  font-size: 12px;
  color: var(--text-muted);
  transition: transform var(--transition);
}

.section-card.open .section-card-header .chevron {
  transform: rotate(90deg);
}

.section-card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 350ms ease, padding 350ms ease;
  padding: 0 20px;
}

.section-card.open .section-card-body {
  max-height: 800px;
  padding: 0 20px 20px;
}

.section-card-body p, .section-card-body pre {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.section-card-body pre {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-family: var(--font-mono);
  font-size: 13px;
  overflow-x: auto;
  margin-top: 8px;
  color: var(--text-primary);
}

/* -- File Path Row -- */
.file-path {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-secondary);
}

.file-path .path-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.copy-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  transition: var(--transition);
  font-family: var(--font-sans);
}

.copy-btn:hover {
  color: var(--accent);
  background: var(--accent-glow);
}

/* -- Test Command -- */
.test-command {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
}

.test-command .cmd-text { flex: 1; }

/* -- Quiz List -- */
.quiz-questions {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.quiz-questions li {
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.quiz-questions li .q-num {
  color: var(--accent);
  font-weight: 600;
  margin-right: 6px;
}

/* -- Status Controls -- */
.status-controls {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  padding-top: 8px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  font-family: var(--font-sans);
}

.btn:hover {
  border-color: var(--border-accent);
  color: var(--text-primary);
  background: var(--bg-card-hover);
}

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

.btn-primary:hover {
  background: var(--accent-dim);
  border-color: var(--accent-dim);
  color: #000;
}

.btn-primary.active {
  background: var(--accent-dim);
  border-color: var(--accent-dim);
}

.btn-danger {
  border-color: var(--danger);
  color: var(--danger);
}

.btn-danger:hover {
  background: var(--danger);
  color: #fff;
}

.confidence-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.confidence-group label {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}

.confidence-stars {
  display: flex;
  gap: 4px;
}

.star-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--border);
  padding: 2px;
  transition: var(--transition);
  line-height: 1;
}

.star-btn.filled {
  color: var(--warning);
}

.star-btn:hover {
  transform: scale(1.2);
}

.notes-group {
  margin-top: 12px;
}

.notes-group textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 13px;
  resize: vertical;
  min-height: 60px;
  transition: var(--transition);
}

.notes-group textarea:focus {
  outline: none;
  border-color: var(--accent);
}

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media (max-width: 768px) {
  header {
    padding: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .app-container {
    flex-direction: column;
  }
  .sidebar {
    width: 100%;
    min-width: 0;
    max-height: 240px;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .detail-panel {
    padding: 20px;
  }
  .day-header h2 {
    font-size: 22px;
  }
  .status-controls {
    flex-direction: column;
    align-items: stretch;
  }
}

/* ═══════════════════════════════════════════════
   MISC
   ═══════════════════════════════════════════════ */
.tooltip {
  position: relative;
}

.tooltip::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-elevated);
  color: var(--text-primary);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
  border: 1px solid var(--border);
}

.tooltip:hover::after {
  opacity: 1;
}

.tag {
  display: inline-block;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 500;
  border-radius: 4px;
  background: var(--accent-glow);
  color: var(--accent);
}

.tag-warning {
  background: rgba(245, 158, 11, 0.1);
  color: var(--warning);
}

.tag-muted {
  background: var(--border);
  color: var(--text-muted);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.day-detail {
  animation: fadeIn 250ms ease;
}
</style>
</head>

<header>
  <div class="header-left">
    <div class="logo">DM</div>
    <div class="header-title">
      <h1>DocuMind</h1>
      <p>AI Document Processing Pipeline · 28-Day Grind</p>
    </div>
  </div>
  <div class="header-right">
    <div class="header-stat">
      <div class="number" id="headerCompleted">0</div>
      <div class="label">Done</div>
    </div>
    <div class="header-stat">
      <div class="number" id="headerStreak">0</div>
      <div class="label">Streak</div>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
  </div>
</header>

<div class="app-container">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Curriculum</h2>
      <div class="progress-bar">
        <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 28 days</div>
    </div>
    <div class="timeline-weeks" id="timeline"></div>
  </nav>

  <!-- DETAIL -->
  <main class="detail-panel" id="detailPanel">
    <div class="empty-state">
      <div class="icon">📄</div>
      <h3>Select a day to begin</h3>
      <p>Click any day in the timeline to see its lesson, quiz, and test details — then build it.</p>
    </div>
  </main>

</div>

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════

const STORAGE_KEY = 'documind_progress';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  return {};
}

function saveProgress(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// state = { [dayIndex]: { done: bool, confidence: number|null, notes: string } }
let progress = loadProgress();
let selectedDay = null;

const DAY_COUNT = CURRICULUM.length;

// ═══════════════════════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════

function getDayStatus(idx) {
  const p = progress[idx];
  if (!p) return 'not-started';
  if (p.done) return 'completed';
  if (p.confidence !== undefined && p.confidence !== null) return 'in-progress';
  return 'not-started';
}

function computeStreak() {
  // Count consecutive completed days from day 1
  let streak = 0;
  for (let i = 0; i < DAY_COUNT; i++) {
    const p = progress[i];
    if (p && p.done) streak++;
    else break;
  }
  return streak;
}

function computeCompleted() {
  let count = 0;
  for (let i = 0; i < DAY_COUNT; i++) {
    const p = progress[i];
    if (p && p.done) count++;
  }
  return count;
}

function renderTimeline() {
  const container = document.getElementById('timeline');
  container.innerHTML = '';
  
  const completed = computeCompleted();
  const streak = computeStreak();
  const pct = Math.round((completed / DAY_COUNT) * 100);
  
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completed} / ${DAY_COUNT} days`;
  document.getElementById('headerCompleted').textContent = completed;
  document.getElementById('headerStreak').textContent = streak;

  let currentWeek = 0;
  let weekGroup = null;

  for (let i = 0; i < DAY_COUNT; i++) {
    const d = CURRICULUM[i];
    const w = d.week;
    
    if (w !== currentWeek) {
      currentWeek = w;
      weekGroup = document.createElement('div');
      weekGroup.className = 'week-group';
      
      const label = document.createElement('div');
      label.className = 'week-label';
      label.textContent = `Week ${w} — ${WEEK_NAMES[w - 1] || ''}`;
      weekGroup.appendChild(label);
      
      container.appendChild(weekGroup);
    }

    const status = getDayStatus(i);
    const item = document.createElement('div');
    item.className = `day-item ${status}`;
    if (i === selectedDay) item.classList.add('active');
    item.dataset.index = i;
    
    item.innerHTML = `
      <div class="day-indicator">${w}.${d.day}</div>
      <div class="day-meta">
        <div class="day-topic">${d.topic}</div>
        <div class="day-sub">${d.focus}</div>
      </div>
      <div class="day-status-dot"></div>
    `;

    item.addEventListener('click', () => selectDay(i));
    weekGroup.appendChild(item);
  }
}

function getQuizForDay(dayNum) {
  return QUIZ_QUESTIONS[dayNum] || null;
}

function selectDay(index) {
  selectedDay = index;
  renderTimeline();
  renderDetail(index);
  
  // Scroll sidebar item into view
  const items = document.querySelectorAll('.day-item');
  if (items[index]) {
    items[index].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function renderDetail(index) {
  const d = CURRICULUM[index];
  const p = progress[index] || {};
  const panel = document.getElementById('detailPanel');
  
  const quizQs = getQuizForDay(d.day);
  const isWeek1 = d.week === 1;
  
  // Only show real quiz content for Week 1 (where we have data)
  const hasQuiz = isWeek1 && quizQs;

  panel.innerHTML = `
    <div class="day-detail">
      <div class="day-header">
        <div class="day-breadcrumb">Week ${d.week} · Day ${d.week}.${d.day} · ${d.topic}</div>
        <h2>${d.topic}</h2>
        <p class="focus-text">${d.focus}</p>
      </div>

      <div class="day-why">
        <strong>Why this matters</strong>: ${d.why}
      </div>

      <!-- Code File -->
      <div class="section-card open">
        <div class="section-card-header" data-toggle>
          <span class="icon">📄</span>
          <h3>Code File</h3>
          <span class="chevron">▸</span>
        </div>
        <div class="section-card-body">
          <div class="file-path">
            <span class="path-text">${d.path}</span>
            <button class="copy-btn" data-copy="${d.path}">Copy</button>
          </div>
          <p style="margin-top: 8px; font-size: 13px; color: var(--text-muted);">
            Look for <code style="background: var(--border); padding: 1px 6px; border-radius: 3px; font-size: 12px;">${d.section || 'the day\'s section'}</code> — fill in the TODO stubs.
          </p>
        </div>
      </div>

      <!-- Test -->
      <div class="section-card open">
        <div class="section-card-header" data-toggle>
          <span class="icon">🧪</span>
          <h3>Test</h3>
          <span class="chevron">▸</span>
        </div>
        <div class="section-card-body">
          <div class="test-command">
            <span class="cmd-text">pytest ${d.test} -v</span>
            <button class="copy-btn" data-copy="pytest ${d.test} -v">Copy</button>
          </div>
          <p style="margin-top: 8px; font-size: 13px; color: var(--text-muted);">
            Run this from the repo root. All tests must pass.
          </p>
        </div>
      </div>

      <!-- Tasks -->
      ${d.tasks && d.tasks.length ? `
      <div class="section-card open">
        <div class="section-card-header" data-toggle>
          <span class="icon">✅</span>
          <h3>Tasks</h3>
          <span class="chevron">▸</span>
        </div>
        <div class="section-card-body">
          <ul style="list-style: none; display: flex; flex-direction: column; gap: 6px;">
            ${d.tasks.map(t => `<li style="padding: 6px 12px; background: var(--bg); border-radius: 6px; font-size: 13px; color: var(--text-secondary); border-left: 2px solid var(--accent);">${t}</li>`).join('')}
          </ul>
        </div>
      </div>
      ` : ''}

      <!-- Quiz -->
      <div class="section-card ${hasQuiz ? 'open' : ''}">
        <div class="section-card-header" data-toggle>
          <span class="icon">📝</span>
          <h3>Quiz — ${hasQuiz ? '5 questions' : 'Not yet written'}</h3>
          <span class="chevron">▸</span>
        </div>
        <div class="section-card-body">
          ${hasQuiz ? `
          <p style="margin-bottom: 10px; font-size: 13px; color: var(--text-muted);">Answer these before writing code. Open <code style="background: var(--border); padding: 1px 6px; border-radius: 3px; font-size: 12px;">${d.quiz}</code> to record your answers.</p>
          <ul class="quiz-questions">
            ${quizQs.map((q, qi) => `<li><span class="q-num">Q${qi + 1}.</span> ${q}</li>`).join('')}
          </ul>
          ` : `
          <p style="font-size: 13px; color: var(--text-muted);">Quiz content for this day will be added when the week's curriculum is built.</p>
          `}
        </div>
      </div>

      <!-- Status Controls -->
      <div class="section-card open">
        <div class="section-card-header" data-toggle>
          <span class="icon">🎯</span>
          <h3>Status</h3>
          <span class="chevron">▸</span>
        </div>
        <div class="section-card-body">
          <div class="status-controls">
            <button class="btn ${p.done ? 'btn-primary active' : ''}" id="markDoneBtn">
              ${p.done ? '✓ Completed' : 'Mark Complete'}
            </button>

            <div class="confidence-group">
              <label>Confidence:</label>
              <div class="confidence-stars" id="confidenceStars">
                ${[1,2,3,4,5].map(n => `<button class="star-btn ${n <= (p.confidence || 0) ? 'filled' : ''}" data-star="${n}">★</button>`).join('')}
              </div>
            </div>
          </div>

          <div class="notes-group">
            <textarea id="dayNotes" placeholder="Notes / blockers / insights for this day..." rows="2">${p.notes || ''}</textarea>
          </div>
        </div>
      </div>
    </div>
  `;

  // ── Event wiring ──
  
  // Section card toggles
  panel.querySelectorAll('[data-toggle]').forEach(header => {
    header.addEventListener('click', () => {
      header.closest('.section-card').classList.toggle('open');
    });
  });

  // Copy buttons
  panel.querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.dataset.copy;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
      }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
      });
    });
  });

  // Mark done
  const doneBtn = document.getElementById('markDoneBtn');
  if (doneBtn) {
    doneBtn.addEventListener('click', () => {
      if (!progress[index]) progress[index] = { done: false, confidence: null, notes: '' };
      progress[index].done = !progress[index].done;
      saveProgress(progress);
      renderDetail(index);
      renderTimeline();
    });
  }

  // Confidence stars
  const starContainer = document.getElementById('confidenceStars');
  if (starContainer) {
    starContainer.querySelectorAll('.star-btn').forEach(star => {
      star.addEventListener('click', () => {
        const val = parseInt(star.dataset.star);
        if (!progress[index]) progress[index] = { done: false, confidence: null, notes: '' };
        progress[index].confidence = progress[index].confidence === val ? null : val;
        saveProgress(progress);
        renderDetail(index);
        renderTimeline();
      });
    });
  }

  // Notes
  const notesArea = document.getElementById('dayNotes');
  if (notesArea) {
    let saveTimer = null;
    notesArea.addEventListener('input', () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        if (!progress[index]) progress[index] = { done: false, confidence: null, notes: '' };
        progress[index].notes = notesArea.value;
        saveProgress(progress);
      }, 500);
    });
  }
}

// ═══════════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════════

function initTheme() {
  const saved = localStorage.getItem('documind_theme');
  if (saved === 'light' || saved === 'dark') {
    document.documentElement.setAttribute('data-theme', saved);
  }
  updateThemeIcon();
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('documind_theme', next);
  updateThemeIcon();
}

function updateThemeIcon() {
  const theme = document.documentElement.getAttribute('data-theme');
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  renderTimeline();
  
  // Auto-select Day 1 if nothing selected
  if (selectedDay === null) {
    selectDay(0);
  }
});
</script>
