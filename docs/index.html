<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocuMind — 28-Day Pipeline Grind</title>
<style>
:root {
  --bg: #0a0a0b;
  --bg-surface: #121214;
  --bg-card: #18181b;
  --bg-card-hover: #1f1f23;
  --bg-elevated: #222226;
  --border: #27272a;
  --border-light: #2f2f33;
  --text-primary: #f4f4f5;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #22d379;
  --accent-dim: #16a34a;
  --accent-glow: rgba(34, 211, 121, 0.12);
  --accent-subtle: rgba(34, 211, 121, 0.06);
  --danger: #ef4444;
  --warning: #f59e0b;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro", "Inter", "Segoe UI", system-ui, sans-serif;
  --font-mono: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", monospace;
  --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

[data-theme="light"] {
  --bg: #fafafa;
  --bg-surface: #ffffff;
  --bg-card: #f4f4f5;
  --bg-card-hover: #e4e4e7;
  --bg-elevated: #e4e4e7;
  --border: #d4d4d8;
  --border-light: #e4e4e7;
  --text-primary: #18181b;
  --text-secondary: #52525b;
  --text-muted: #a1a1aa;
  --accent: #16a34a;
  --accent-glow: rgba(22, 163, 74, 0.1);
  --accent-subtle: rgba(22, 163, 74, 0.05);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; line-height: 1.6; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── HEADER ── */
header { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--bg-surface); position: sticky; top: 0; z-index: 50; }
.header-left { display: flex; align-items: center; gap: 14px; }
.logo { width: 32px; height: 32px; background: var(--accent); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; color: #000; flex-shrink: 0; }
.header-title h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
.header-title p { font-size: 11px; color: var(--text-secondary); margin-top: -1px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-stat { text-align: right; }
.header-stat .num { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--accent); }
.header-stat .lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.theme-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-secondary); width: 32px; height: 32px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
.theme-btn:hover { border-color: var(--border-light); color: var(--text-primary); }

/* ── LAYOUT ── */
.app { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar { width: 300px; min-width: 300px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg-surface); }
.sidebar-head { padding: 14px 18px 12px; border-bottom: 1px solid var(--border); }
.sidebar-head h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-bottom: 10px; }
.pbar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.pbar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 500ms var(--ease-out); }
.ptext { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.tl-weeks { padding: 8px 0; }
.week-g { }
.week-l { padding: 6px 18px 3px; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
.day-i { display: flex; align-items: center; gap: 10px; padding: 8px 18px; cursor: pointer; transition: var(--transition); border-left: 2px solid transparent; }
.day-i:hover { background: var(--bg-card-hover); }
.day-i.active { background: var(--accent-subtle); border-left-color: var(--accent); }
.day-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; color: var(--text-muted); transition: var(--transition); }
.day-i.completed .day-dot { background: var(--accent); border-color: var(--accent); color: #000; }
.day-i.active .day-dot { border-color: var(--accent); color: var(--accent); }
.day-i.not-started .day-dot { border-color: var(--border); color: var(--text-muted); }
.day-m { flex: 1; min-width: 0; }
.day-m .t { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-m .s { font-size: 10px; color: var(--text-muted); margin-top: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-sd { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.day-i.completed .day-sd { background: var(--accent); }
.day-i.active .day-sd { background: var(--warning); }
.day-i.not-started .day-sd { background: var(--text-muted); }

/* ── MAIN PANEL ── */
.panel { flex: 1; overflow-y: auto; padding: 28px 36px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); text-align: center; gap: 8px; }
.empty-state .ei { font-size: 40px; opacity: 0.2; }
.empty-state h3 { font-size: 16px; color: var(--text-secondary); font-weight: 500; }
.empty-state p { font-size: 13px; max-width: 320px; }

/* ── DAY DETAIL ── */
.dd { animation: fIn 350ms var(--ease-out); }
@keyframes fIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.dh { margin-bottom: 24px; }
.db { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.dh h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 4px; }
.dh .ft { font-size: 14px; color: var(--text-secondary); }
.dw { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 18px; margin-bottom: 20px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.dw strong { color: var(--accent); font-weight: 600; }

/* ── STEP SECTIONS ── */
.step { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 12px; overflow: hidden; }
.step-h { display: flex; align-items: center; gap: 10px; padding: 14px 18px; cursor: pointer; user-select: none; transition: var(--transition); }
.step-h:hover { background: var(--bg-card-hover); }
.step-h .si { font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; }
.step-h h3 { font-size: 13px; font-weight: 600; flex: 1; }
.step-h .st { font-size: 10px; color: var(--text-muted); background: var(--border); padding: 1px 8px; border-radius: 4px; font-weight: 500; }
.step-h .ch { font-size: 11px; color: var(--text-muted); transition: transform var(--transition); }
.step.open .step-h .ch { transform: rotate(90deg); }
.step-b { max-height: 0; overflow: hidden; transition: max-height 400ms ease, padding 400ms ease; padding: 0 18px; }
.step.open .step-b { max-height: 2000px; padding: 0 18px 18px; }
.step-b p, .step-b li { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
.step-b p { margin-bottom: 10px; }
.step-b p:last-child { margin-bottom: 0; }

/* Lesson explanation */
.lesson-text { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
.lesson-text p { margin-bottom: 10px; }
.lesson-text p:last-child { margin-bottom: 0; }
.lesson-text code { background: var(--border); padding: 1px 6px; border-radius: 3px; font-family: var(--font-mono); font-size: 12px; color: var(--accent); }
.lesson-text pre { background: #0d0d0f; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; font-family: var(--font-mono); font-size: 12px; overflow-x: auto; margin: 10px 0; color: #e4e4e7; line-height: 1.5; }
[data-theme="light"] .lesson-text pre { background: #f0f0f1; color: #18181b; }
.lesson-text pre .kw { color: #c084fc; }
.lesson-text pre .fn { color: #22d379; }
.lesson-text pre .str { color: #f59e0b; }
.lesson-text pre .cm { color: #71717a; font-style: italic; }
.lesson-text pre .num { color: #60a5fa; }
[data-theme="light"] .lesson-text pre .kw { color: #7c3aed; }
[data-theme="light"] .lesson-text pre .fn { color: #16a34a; }
[data-theme="light"] .lesson-text pre .str { color: #d97706; }
[data-theme="light"] .lesson-text pre .num { color: #2563eb; }

/* File path */
.fp { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 12px; font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
.fp .pt { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cb { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 3px 8px; border-radius: 4px; font-size: 11px; transition: var(--transition); font-family: var(--font-sans); }
.cb:hover { color: var(--accent); background: var(--accent-glow); }

/* Test command */
.tc { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 12px; font-family: var(--font-mono); font-size: 12px; color: var(--accent); }
.tc .ct { flex: 1; }

/* Task list */
.tasks { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.tasks li { padding: 7px 12px; background: var(--bg); border-radius: var(--radius-sm); font-size: 12px; color: var(--text-secondary); border-left: 2px solid var(--accent); line-height: 1.5; }

/* Quiz */
.ql { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.ql li { padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.ql li .qn { color: var(--accent); font-weight: 600; margin-right: 4px; }

/* Status */
.sc { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text-secondary); font-size: 12px; font-weight: 500; cursor: pointer; transition: var(--transition); font-family: var(--font-sans); }
.btn:hover { border-color: var(--border-light); color: var(--text-primary); background: var(--bg-card-hover); }
.btn-p { background: var(--accent); border-color: var(--accent); color: #000; }
.btn-p:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
.btn-p.active { background: var(--accent-dim); }
.cg { display: flex; align-items: center; gap: 6px; }
.cg label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.cs { display: flex; gap: 3px; }
.sb { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--border); padding: 1px; transition: var(--transition); line-height: 1; }
.sb.fl { color: var(--warning); }
.sb:hover { transform: scale(1.2); }
.ng { margin-top: 10px; }
.ng textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; color: var(--text-primary); font-family: var(--font-sans); font-size: 12px; resize: vertical; min-height: 50px; transition: var(--transition); }
.ng textarea:focus { outline: none; border-color: var(--accent); }

/* Responsive */
@media (max-width: 768px) {
  header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
  .app { flex-direction: column; }
  .sidebar { width: 100%; min-width: 0; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
  .panel { padding: 18px; }
  .dh h2 { font-size: 20px; }
  .sc { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">DM</div>
    <div class="header-title">
      <h1>DocuMind</h1>
      <p>AI Document Processing · 28-Day Project</p>
    </div>
  </div>
  <div class="header-right">
    <div class="header-stat"><div class="num" id="hDone">0</div><div class="lbl">Done</div></div>
    <div class="header-stat"><div class="num" id="hStreak">0</div><div class="lbl">Streak</div></div>
    <button class="theme-btn" id="themeBtn">☀️</button>
  </div>
</header>

<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <h2>Curriculum</h2>
      <div class="pbar"><div class="pbar-fill" id="pf" style="width:0%"></div></div>
      <div class="ptext" id="pt">0 / 28 days</div>
    </div>
    <div class="tl-weeks" id="tl"></div>
  </nav>

  <main class="panel" id="panel">
    <div class="empty-state">
      <div class="ei">📄</div>
      <h3>Pick a day to start</h3>
      <p>Each day: learn the concept, answer the quiz, write the code, pass the test.</p>
    </div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CURRICULUM DATA — All 28 Days Fully Loaded
// ═══════════════════════════════════════════════════════════════

const LESSONS = [
  // ──── WEEK 1: OOP FOUNDATION ────
  {
    week:1, day:1, topic:"Document Class", focus:"Blueprint, self, constructor", why:"Every ML model you'll ever use (PyTorch nn.Module, sklearn estimators) is an instance of a class. Before you can build a document pipeline, you need to understand what a class is and how to stamp out objects.",
    lesson:`<p>A <strong>class</strong> is a blueprint. An <strong>object</strong> (or <em>instance</em>) is a concrete stamp from that blueprint. Think of a class like a cookie cutter and objects like the cookies themselves.</p>
<p>The method <code>__init__</code> runs automatically when you create an instance. Its first parameter is always <code>self</code> — the object being created. Through <code>self</code>, you attach data to the instance.</p>
<pre><span class="kw">class</span> <span class="fn">Document</span>:
    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="kw">self</span>, content, doc_type=<span class="str">"text"</span>, metadata=<span class="kw">None</span>):
        <span class="kw">self</span>.content = content
        <span class="kw">self</span>.doc_type = doc_type
        <span class="kw">self</span>.metadata = metadata <span class="kw">or</span> {}

    <span class="kw">def</span> <span class="fn">char_count</span>(<span class="kw">self</span>):
        <span class="kw">return</span> <span class="built_in">len</span>(<span class="kw">self</span>.content)</pre>
<p>Notice <code>metadata=None</code> with a fallback — never use mutable defaults like <code>metadata={}</code> directly in the signature. That's a classic Python gotcha: all instances would share the same dict.</p>
<p>Your job: fill in the TODO stubs in <code>document.py</code> so the Document class stores content, doc_type, and metadata, and exposes <code>char_count()</code> and <code>word_count()</code>.</p>`,
    path:"src/documind/core/document.py", section:"DAY 1", test:"tests/test_day1.py",
    quiz:[
      "What does 'self' refer to inside a Python method?",
      "What happens inside __init__ when a class is instantiated?",
      "Can a class have multiple instances? How does each maintain its own state?",
      "What is the difference between a class and an object?",
      "Why should you avoid mutable default arguments like metadata={}?"
    ],
    tasks:[
      "Define class Document with __init__(self, content, doc_type, metadata)",
      "Implement char_count() returning len(self.content)",
      "Implement word_count() returning len(self.content.split())",
      "Set defaults: doc_type='text', metadata=None (with {} fallback)"
    ]
  },
  {
    week:1, day:2, topic:"Class Attributes & Factory", focus:"Shared state, classmethods, properties", why:"Some data belongs to the class itself, not any single instance. A counter that tracks all documents ever created, or a factory method that standardizes how documents are built.",
    lesson:`<p><strong>Class attributes</strong> live on the class, not on instances. Every instance sees the same value unless it's shadowed. Use them for shared counters, allowed types, or configuration.</p>
<pre><span class="kw">class</span> <span class="fn">Document</span>:
    counter = <span class="num">0</span>
    allowed_types = {<span class="str">"text"</span>, <span class="str">"json"</span>, <span class="str">"csv"</span>}

    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="kw">self</span>, content, doc_type=<span class="str">"text"</span>):
        Document.counter += <span class="num">1</span>
        <span class="kw">self</span>.id = Document.counter
        <span class="kw">self</span>.content = content</pre>
<p>A <strong>classmethod</strong> (<code>@classmethod</code>) receives the class (<code>cls</code>) instead of the instance. It's the classic <em>factory</em> pattern: an alternate constructor.</p>
<pre>    <span class="meta">@classmethod</span>
    <span class="kw">def</span> <span class="fn">from_json</span>(<span class="kw">cls</span>, json_str):
        data = json.loads(json_str)
        <span class="kw">return</span> <span class="kw">cls</span>(data[<span class="str">"content"</span>], data[<span class="str">"doc_type"</span>])</pre>
<p>A <strong>property</strong> (<code>@property</code>) lets you define a method that looks like an attribute. Use it for computed values.</p>
<pre>    <span class="meta">@property</span>
    <span class="kw">def</span> <span class="fn">size_kb</span>(<span class="kw">self</span>):
        <span class="kw">return</span> <span class="built_in">round</span>(<span class="built_in">len</span>(<span class="kw">self</span>.content) / <span class="num">1024</span>, <span class="num">2</span>)</pre>`,
    path:"src/documind/core/document.py", section:"DAY 2", test:"tests/test_day2.py",
    quiz:[
      "What is the difference between a class attribute and an instance attribute?",
      "How does a @classmethod differ from a regular method?",
      "What is a @property and when would you use it?",
      "How does the factory pattern (from_json) help create objects?",
      "Why would you increment a counter on each instantiation?"
    ],
    tasks:[
      "Add class attributes: counter (int) and allowed_types (set)",
      "Implement from_json() classmethod factory that parses JSON string",
      "Add size_kb property returning len(content)//1024",
      "Increment counter in __init__ and assign self.id"
    ]
  },
  {
    week:1, day:3, topic:"Dunder Methods I", focus:"__repr__, __str__, __len__, __eq__", why:"Dunder methods give your objects the same ergonomics as built-in types. Want to len(my_doc)? Want to print it and see useful info? Want two documents to compare by value? That's all dunders.",
    lesson:`<p><strong>Dunder</strong> (double underscore) methods let your objects behave like Python built-ins. They're called implicitly by Python syntax — you never call <code>x.__len__()</code> directly; you call <code>len(x)</code> and Python does the rest.</p>
<pre><span class="kw">def</span> <span class="fn">__repr__</span>(<span class="kw">self</span>):
    <span class="kw">return</span> <span class="str">f"Document(type='{self.doc_type}', chars={len(self.content)})"</span>

<span class="kw">def</span> <span class="fn">__str__</span>(<span class="kw">self</span>):
    <span class="kw">return</span> <span class="str">f"Doc #{self.id}: {self.content[:80]}..."</span>

<span class="kw">def</span> <span class="fn">__len__</span>(<span class="kw">self</span>):
    <span class="kw">return</span> <span class="built_in">len</span>(<span class="kw">self</span>.content)

<span class="kw">def</span> <span class="fn">__eq__</span>(<span class="kw">self</span>, other):
    <span class="kw">if</span> <span class="keyword">not</span> <span class="built_in">isinstance</span>(other, Document):
        <span class="kw">return</span> <span class="built_in">NotImplemented</span>
    <span class="kw">return</span> <span class="kw">self</span>.content == other.content <span class="keyword">and</span> <span class="kw">self</span>.doc_type == other.doc_type</pre>
<p><code>__repr__</code> is for developers (unambiguous). <code>__str__</code> is for users (readable). <code>__len__</code> is called by <code>len()</code>. <code>__eq__</code> is called by <code>==</code>. Always return <code>NotImplemented</code> (not <code>False</code>) when comparing with an incompatible type — this lets the other object try.</p>`,
    path:"src/documind/core/document.py", section:"DAY 3", test:"tests/test_day3.py",
    quiz:[
      "What does __repr__ return and who calls it?",
      "How does __str__ differ from __repr__?",
      "What must __len__ return? What happens if it returns a non-integer?",
      "How does __eq__ allow custom equality comparison?",
      "Which dunder method is called by print()?"
    ],
    tasks:[
      "Implement __repr__ returning 'Document(type=X, chars=N)'",
      "Implement __str__ with first 80 chars + ellipsis",
      "Implement __len__ returning len(self.content)",
      "Implement __eq__ comparing content + doc_type"
    ]
  },
  {
    week:1, day:4, topic:"Dunder Methods II", focus:"__call__, __enter__/__exit__, __add__", why:"Making objects callable (__call__) lets you use them like functions. Context managers (__enter__/__exit__) are how 'with open()' works. Operator overloading (__add__) makes your types feel native.",
    lesson:`<p><code>__call__</code> makes an instance callable like a function. This is how PyTorch model layers work: <code>layer(x)</code> calls <code>__call__</code> internally.</p>
<pre><span class="kw">def</span> <span class="fn">__call__</span>(<span class="kw">self</span>, prefix=<span class="str">""</span>):
    <span class="kw">return</span> <span class="str">f"{prefix}{self.content}"</span></pre>
<p>Context managers handle setup/teardown. <code>__enter__</code> runs when the <code>with</code> block starts; <code>__exit__</code> runs when it ends (even if an exception occurs).</p>

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const WEEK_NAMES = ["OOP Foundation", "Data Structures & Flow", "Complex Structures for AI Agents", "FastAPI Capstone"];
const SK = 'documind_v2';

function loadP() { try { const r=localStorage.getItem(SK); if(r) return JSON.parse(r); } catch(e){} return {}; }
function saveP(s) { localStorage.setItem(SK, JSON.stringify(s)); }
let progress = loadP();
let sel = null;

function gs(i) { const p=progress[i]; if(!p) return 'not-started'; if(p.done) return 'completed'; return 'not-started'; }

function cs() { let c=0; for(let i=0;i<LESSONS.length;i++){const p=progress[i];if(p&&p.done)c++} return c; }
function st() { let s=0; for(let i=0;i<LESSONS.length;i++){const p=progress[i];if(p&&p.done)s++;else break} return s; }

// ── RENDER TIMELINE ──
function renderTL() {
  const c = document.getElementById('tl');
  c.innerHTML = '';
  const done = cs(), streak = st(), pct = Math.round((done/LESSONS.length)*100);
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pt').textContent = `${done} / ${LESSONS.length} days`;
  document.getElementById('hDone').textContent = done;
  document.getElementById('hStreak').textContent = streak;

  let w = 0, g = null;
  for(let i=0;i<LESSONS.length;i++) {
    const d = LESSONS[i];
    if(d.week !== w) {
      w = d.week;
      g = document.createElement('div'); g.className='week-g';
      const l = document.createElement('div'); l.className='week-l';
      l.textContent = `Week ${w} — ${WEEK_NAMES[w-1]||''}`;
      g.appendChild(l); c.appendChild(g);
    }
    const st2 = gs(i);
    const it = document.createElement('div');
    it.className = `day-i ${st2}`;
    if(i===sel) it.classList.add('active');
    it.dataset.i = i;
    it.innerHTML = `<div class="day-dot">${w}.${d.day}</div><div class="day-m"><div class="t">${d.topic}</div><div class="s">${d.focus}</div></div><div class="day-sd"></div>`;
    it.addEventListener('click', ()=>{sel=i; renderTL(); renderDetail(i);});
    g.appendChild(it);
  }
}

// ── RENDER DETAIL ──
function renderDetail(idx) {
  const d = LESSONS[idx];
  const p = progress[idx]||{};
  const panel = document.getElementById('panel');

  panel.innerHTML = `<div class="dd">
    <div class="dh">
      <div class="db">Week ${d.week} · Day ${d.week}.${d.day} · ${d.topic}</div>
      <h2>${d.topic}</h2>
      <p class="ft">${d.focus}</p>
    </div>
    <div class="dw"><strong>Why this matters</strong>: ${d.why}</div>

    <!-- Step 1: Explanation -->
    <div class="step open">
      <div class="step-h" data-toggle><span class="si">📖</span><h3>Learn the Concept</h3><span class="ch">▸</span></div>
      <div class="step-b"><div class="lesson-text">${d.lesson}</div></div>
    </div>

    <!-- Step 2: Quiz -->
    <div class="step">
      <div class="step-h" data-toggle><span class="si">📝</span><h3>Quiz Yourself</h3><span class="st">5 questions</span><span class="ch">▸</span></div>
      <div class="step-b">
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">Answer these before writing code. Record your answers in <code style="background:var(--border);padding:1px 5px;border-radius:3px;font-size:11px;">quizzes/week${d.week}/day${d.day}_quiz.py</code>.</p>
        <ul class="ql">${d.quiz.map((q,qi)=>'<li><span class="qn">Q'+(qi+1)+'.</span> '+q+'</li>').join('')}</ul>
      </div>
    </div>

    <!-- Step 3: Tasks & Code -->
    <div class="step">
      <div class="step-h" data-toggle><span class="si">⚡</span><h3>Write the Code</h3><span class="st">${d.tasks.length} tasks</span><span class="ch">▸</span></div>
      <div class="step-b">
        <div class="fp"><span class="pt">${d.path}</span><button class="cb" data-copy="${d.path}">Copy</button></div>
        <p style="font-size:12px;color:var(--text-muted);margin:8px 0;">Look for section <code style="background:var(--border);padding:1px 5px;border-radius:3px;font-size:11px;">${d.section}</code> — fill in the TODO stubs.</p>
        <ul class="tasks">${d.tasks.map(t=>'<li>'+t+'</li>').join('')}</ul>
      </div>
    </div>

    <!-- Step 4: Test -->
    <div class="step">
      <div class="step-h" data-toggle><span class="si">🧪</span><h3>Pass the Test</h3><span class="ch">▸</span></div>
      <div class="step-b">
        <div class="tc"><span class="ct">pytest ${d.test} -v</span><button class="cb" data-copy="pytest ${d.test} -v">Copy</button></div>
        <p style="font-size:12px;color:var(--text-muted);margin-top:8px;">Run from repo root. All tests must pass before marking complete.</p>
      </div>
    </div>

    <!-- Status -->
    <div class="step open">
      <div class="step-h"><span class="si">🎯</span><h3>Track Progress</h3><span class="ch">▸</span></div>
      <div class="step-b">
        <div class="sc">
          <button class="btn ${p.done?'btn-p active':''}" id="mkDone">${p.done?'✓ Completed':'Mark Complete'}</button>
          <div class="cg"><label>Confidence:</label><div class="cs" id="cStars">${[1,2,3,4,5].map(n=>'<button class="sb '+(n<=(p.confidence||0)?'fl':'')+'" data-s="'+n+'">★</button>').join('')}</div></div>
        </div>
        <div class="ng"><textarea id="dayNotes" placeholder="Notes / blockers / insights..." rows="2">${p.notes||''}</textarea></div>
      </div>
    </div>
  </div>`;

  // Wire toggles
  panel.querySelectorAll('[data-toggle]').forEach(h=>{
    h.addEventListener('click',()=>{h.closest('.step').classList.toggle('open');});
  });
  // Copy buttons
  panel.querySelectorAll('[data-copy]').forEach(b=>{
    b.addEventListener('click',()=>{
      const t=b.dataset.copy;
      navigator.clipboard.writeText(t).then(()=>{b.textContent='Copied!';setTimeout(()=>{b.textContent='Copy';},1200);}).catch(()=>{
        const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
        b.textContent='Copied!';setTimeout(()=>{b.textContent='Copy';},1200);
      });
    });
  });
  // Mark done
  const db=document.getElementById('mkDone');
  if(db) db.addEventListener('click',()=>{if(!progress[idx])progress[idx]={done:false,confidence:null,notes:''};progress[idx].done=!progress[idx].done;saveP(progress);renderDetail(idx);renderTL();});
  // Stars
  const sc=document.getElementById('cStars');
  if(sc) sc.querySelectorAll('.sb').forEach(s=>{
    s.addEventListener('click',()=>{
      const v=parseInt(s.dataset.s);
      if(!progress[idx])progress[idx]={done:false,confidence:null,notes:''};
      progress[idx].confidence=progress[idx].confidence===v?null:v;
      saveP(progress);renderDetail(idx);renderTL();
    });
  });
  // Notes
  const na=document.getElementById('dayNotes');
  if(na){
    let st2=null;
    na.addEventListener('input',()=>{clearTimeout(st2);st2=setTimeout(()=>{if(!progress[idx])progress[idx]={done:false,confidence:null,notes:''};progress[idx].notes=na.value;saveP(progress);},500);});
  }
  // Scroll detail to top on day change
  panel.scrollTop = 0;
}

// ── THEME ──
function initTheme(){
  const s=localStorage.getItem('documind_theme');
  if(s==='light'||s==='dark') document.documentElement.setAttribute('data-theme',s);
  updateThemeIcon();
}
function toggleTheme(){
  const c=document.documentElement.getAttribute('data-theme');
  const n=c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('documind_theme',n);
  updateThemeIcon();
}
function updateThemeIcon(){
  const t=document.documentElement.getAttribute('data-theme');
  const b=document.getElementById('themeBtn');
  if(b) b.textContent=t==='dark'?'☀️':'🌙';
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  initTheme();
  document.getElementById('themeBtn').addEventListener('click',toggleTheme);
  renderTL();
  sel=0;
  renderDetail(0);
});
</script>
</body>
</html>
